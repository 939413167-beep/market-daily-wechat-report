name: Daily Market WeChat Report

on:
  schedule:
    # A shares close report: 15:30 Beijing/Taipei time.
    - cron: "30 7 * * 1-5"
    # US close report: 08:05 Beijing/Taipei time, Tuesday-Saturday.
    # Avoid the UTC top-of-hour schedule queue.
    - cron: "5 0 * * 2-6"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "report"
        type: choice
        options:
          - report
          - test-push
      market:
        description: "Market to run"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - a
          - us
      push:
        description: "Send WeChat push"
        required: true
        default: true
        type: boolean

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      PUSH_CHANNEL: ${{ secrets.PUSH_CHANNEL }}
      SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      DEDUP_STATE_FILE: state/push_log.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare runtime options
        id: runtime
        shell: bash
        run: |
          echo "cache_date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "market=${{ inputs.market }}" >> "$GITHUB_OUTPUT"
            echo "push=${{ inputs.push }}" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=" >> "$GITHUB_OUTPUT"
          else
            echo "mode=report" >> "$GITHUB_OUTPUT"
            schedule="${{ github.event.schedule }}"
            bj_time="$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z')"
            bj_hm="$(TZ=Asia/Shanghai date '+%H%M')"
            bj_hm_num=$((10#$bj_hm))
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=" >> "$GITHUB_OUTPUT"
            echo "Schedule: $schedule; Beijing time: $bj_time"
            if [ "$schedule" = "30 7 * * 1-5" ]; then
              echo "market=a" >> "$GITHUB_OUTPUT"
              if [ "$bj_hm_num" -lt 1530 ] || [ "$bj_hm_num" -gt 1800 ]; then
                echo "should_run=false" >> "$GITHUB_OUTPUT"
                echo "skip_reason=A股定时任务延迟到北京时间 $bj_time，已跳过推送，避免半夜补发 A股日报。" >> "$GITHUB_OUTPUT"
              fi
            elif [ "$schedule" = "5 0 * * 2-6" ]; then
              echo "market=us" >> "$GITHUB_OUTPUT"
            else
              echo "market=auto" >> "$GITHUB_OUTPUT"
            fi
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore dedupe state
        uses: actions/cache@v4
        with:
          path: state
          key: market-daily-state-${{ runner.os }}-${{ steps.runtime.outputs.cache_date }}-${{ github.run_id }}
          restore-keys: |
            market-daily-state-${{ runner.os }}-${{ steps.runtime.outputs.cache_date }}-

      - name: Run report
        if: steps.runtime.outputs.should_run == 'true'
        shell: bash
        run: |
          mkdir -p reports state
          if [ "${{ steps.runtime.outputs.mode }}" = "test-push" ]; then
            python -m market_daily_wechat_report.main --test-push
          elif [ "${{ steps.runtime.outputs.push }}" = "true" ]; then
            python -m market_daily_wechat_report.main --market "${{ steps.runtime.outputs.market }}"
          else
            python -m market_daily_wechat_report.main --market "${{ steps.runtime.outputs.market }}" --dry-run
          fi

      - name: Skip delayed scheduled report
        if: steps.runtime.outputs.should_run != 'true'
        run: |
          echo "${{ steps.runtime.outputs.skip_reason }}"

      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-reports-${{ github.run_id }}
          path: reports/*.md
          if-no-files-found: ignore
